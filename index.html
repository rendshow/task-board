<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📋 双人任务看板</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --heading: #f0f6fc;
      --accent: #58a6ff;
      --green: #3fb950;
      --orange: #d2991d;
      --muted: #8b949e;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      line-height: 1.7;
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    h1 { color: var(--heading); font-size: 1.6em; margin: 0 0 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    h3 { color: var(--heading); font-size: 1.15em; margin: 28px 0 10px; }
    h3::before { margin-right: 6px; }
    h3:has(+ ul li input[type="checkbox"]) { /* 自动渲染为卡片样式 */ }
    ul { list-style: none; padding: 0; }
    ul ul { padding-left: 18px; }
    li { position: relative; padding: 4px 0 4px 24px; }
    li:has(input[type="checkbox"]) { padding-left: 26px; }
    /* 复选框 */
    input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      position: absolute; left: 0; top: 7px;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      cursor: default;
    }
    input[type="checkbox"]:checked {
      background: var(--green);
      border-color: var(--green);
    }
    input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      left: 2px; top: -2px;
      font-size: 12px; font-weight: bold;
      color: #fff;
    }
    /* 代码 */
    code {
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      color: var(--accent);
      border: 1px solid var(--border);
    }
    /* 引用 */
    blockquote {
      border-left: 3px solid var(--orange);
      margin: 12px 0;
      padding: 8px 16px;
      background: var(--surface);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--muted);
      font-size: 0.95em;
    }
    /* 分割线 */
    hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    /* 强调 */
    strong { color: var(--heading); }
    /* 卡片效果 */
    .card, h3:has(+ ul) {
      /* 自动处理 */;
    }
    /* 链接 */
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    /* 表格 */
    table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.9em; }
    th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    th { background: var(--surface); color: var(--heading); }
    /* 加载中 */
    #loading { color: var(--muted); font-style: italic; }
    #error { color: #f85149; display: none; }
    /* 移动端 */
    @media (max-width: 640px) {
      body { padding: 16px 12px 48px; font-size: 0.95em; }
      h1 { font-size: 1.3em; }
      table { font-size: 0.8em; }
    }
  </style>
</head>
<body>
  <div id="loading">⏳ 加载中...</div>
  <div id="error"></div>
  <div id="content"></div>

  <script>
    (async () => {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const content = document.getElementById('content');

      try {
        // 禁用缓存，每次加载最新内容
        const ts = Date.now();
        const resp = await fetch(`KANBAN.md?t=${ts}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        let md = await resp.text();

        // 兼容 Windows 换行符
        md = md.replace(/\r\n/g, '\n');

        // 配置 marked
        marked.setOptions({
          breaks: false,
          gfm: true
        });

        const html = marked.parse(md);
        content.innerHTML = html;
        loading.style.display = 'none';

      } catch (e) {
        loading.style.display = 'none';
        error.style.display = 'block';
        error.textContent = '⚠️ 无法加载看板内容: ' + e.message;
      }
    })();
  </script>
</body>
</html>
